<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI Resume Reviewer cover</title>
  <desc id="desc">A product cover showing resume intake, ATS scoring, reviewer perspectives, and approved draft workflow.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7faf1"/>
      <stop offset="1" stop-color="#e7f0ea"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#0f817d"/>
      <stop offset="1" stop-color="#398a55"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#14332f" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#paper)"/>
  <rect x="92" y="84" width="1416" height="732" rx="18" fill="#fbfcf7" stroke="#cbd9ce" filter="url(#shadow)"/>
  <rect x="92" y="84" width="1416" height="92" rx="18" fill="#eff5ed"/>
  <circle cx="146" cy="130" r="22" fill="url(#accent)"/>
  <text x="146" y="138" text-anchor="middle" font-family="Aptos Display, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" fill="#fbfcf7">RR</text>
  <text x="190" y="139" font-family="Aptos Display, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#16302e">AI Resume Reviewer</text>
  <text x="1120" y="137" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#31514c">Review</text>
  <text x="1218" y="137" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#31514c">Results</text>
  <text x="1324" y="137" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#31514c">Versions</text>
  <text x="202" y="300" font-family="Aptos Display, Segoe UI, Arial, sans-serif" font-size="74" font-weight="800" fill="#16302e">Review before applying</text>
  <text x="202" y="354" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="26" fill="#49625d">Upload a resume, add a target role, and keep only the edits that improve the application.</text>
  <rect x="202" y="430" width="470" height="228" rx="16" fill="#f6faf4" stroke="#cad9ce"/>
  <text x="232" y="482" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" fill="#1d3936">Resume intake</text>
  <rect x="232" y="516" width="382" height="26" rx="13" fill="#d8e7dc"/>
  <rect x="232" y="562" width="330" height="18" rx="9" fill="#c1d4c7"/>
  <rect x="232" y="598" width="396" height="18" rx="9" fill="#c1d4c7"/>
  <rect x="232" y="634" width="274" height="18" rx="9" fill="#c1d4c7"/>
  <rect x="746" y="250" width="662" height="480" rx="20" fill="#ffffff" stroke="#c6d7cc" filter="url(#shadow)"/>
  <circle cx="840" cy="356" r="68" fill="none" stroke="#d6e3db" stroke-width="16"/>
  <path d="M840 288a68 68 0 1 1-55 108" fill="none" stroke="#0f817d" stroke-width="16" stroke-linecap="round"/>
  <text x="840" y="370" text-anchor="middle" font-family="Aptos Display, Segoe UI, Arial, sans-serif" font-size="42" font-weight="900" fill="#14332f">82</text>
  <text x="940" y="328" font-family="Aptos Display, Segoe UI, Arial, sans-serif" font-size="34" font-weight="850" fill="#14332f">ATS score and review plan</text>
  <text x="940" y="374" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="21" fill="#4d645f">Recruiter, ATS, and senior-engineer perspectives in one workspace.</text>
  <rect x="810" y="466" width="240" height="56" rx="10" fill="#eaf5f1" stroke="#b9d1c7"/>
  <text x="838" y="502" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" fill="#14332f">Missing keywords</text>
  <rect x="1082" y="466" width="240" height="56" rx="10" fill="#fff8e8" stroke="#e4d4ab"/>
  <text x="1110" y="502" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" fill="#4d4122">Priority problems</text>
  <rect x="810" y="560" width="520" height="104" rx="14" fill="#f6faf4" stroke="#cbd9ce"/>
  <text x="842" y="606" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="21" font-weight="800" fill="#14332f">Approved changes become saved versions</text>
  <text x="842" y="642" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="19" fill="#566d68">Keep the draft editable, restorable, and ready for handoff.</text>
</svg>
